<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/portfolio-website/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shivam Kumar - Flutter Developer | Mobile App Developer | Software Developer. B.Tech CSE student at CGC Jhanjeri building beautiful Flutter apps.">
  <meta name="keywords" content="Shivam Kumar, Flutter Developer, Mobile App Developer, Flutter Web, Dart, Software Developer, CGC Jhanjeri, Portfolio">
  <meta name="author" content="Shivam Kumar">

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Shivam Kumar | Flutter Developer Portfolio">
  <meta property="og:description" content="Passionate Flutter Developer building beautiful mobile and web applications. B.Tech CSE student at CGC Jhanjeri.">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Shivam Kumar | Flutter Developer Portfolio">
  <meta name="twitter:description" content="Passionate Flutter Developer building beautiful mobile and web applications.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shivam Kumar">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <title>Shivam Kumar | Flutter Developer Portfolio</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0A0E21;
    }
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0A0E21;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .loader-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #6C63FF, #00D4FF);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: white;
      margin-bottom: 24px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .loader-text {
      font-family: 'Segoe UI', sans-serif;
      color: #9E9E9E;
      font-size: 14px;
      letter-spacing: 2px;
    }
    .loader-bar {
      width: 200px;
      height: 3px;
      background: rgba(108, 99, 255, 0.2);
      border-radius: 2px;
      margin-top: 16px;
      overflow: hidden;
    }
    .loader-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6C63FF, #00D4FF);
      border-radius: 2px;
      animation: loading 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(108,99,255,0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(108,99,255,0); }
    }
    @keyframes loading {
      0% { width: 0%; }
      50% { width: 100%; }
      100% { width: 0%; margin-left: 100%; }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loader-logo">SK</div>
    <div class="loader-text">LOADING PORTFOLIO</div>
    <div class="loader-bar">
      <div class="loader-bar-fill"></div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('loading-screen');
      loader.style.opacity = '0';
      setTimeout(function() { loader.style.display = 'none'; }, 500);
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
