name: portfolio_website
description: Shivam Kumar - Flutter Developer Portfolio
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  url_launcher: ^6.2.1
  google_fonts: ^6.1.0
  animate_do: ^3.1.2
  flutter_animate: ^4.3.0
  visibility_detector: ^0.4.0+2
  scrollable_positioned_list: ^0.3.8
  smooth_page_indicator: ^1.1.0
  percent_indicator: ^4.2.3
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  timeline_tile: ^2.0.0
  card_swiper: ^3.0.1
  lottie: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  font_awesome_flutter: ^10.6.0
  go_router: ^12.1.1
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/data/
